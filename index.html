<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIYAGEN Trail Engineering — 卸注文ページ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f5f5f5;color:#333}
.page-layout{display:flex;min-height:100vh}
.main-content{flex:1;min-width:0;padding-bottom:20px}

/* Cart sidebar - always visible on desktop */
.cart-sidebar{width:340px;flex-shrink:0;background:white;border-left:1px solid #e5e7eb;position:sticky;top:56px;height:calc(100vh - 56px);display:flex;flex-direction:column;z-index:50}

header{background:white;padding:10px 20px;box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{margin:0;font-size:17px;font-weight:bold;color:#1a1a2e}
.header-subtitle{font-size:10px;color:#666;margin:0}
.header-right{display:flex;align-items:center;gap:10px}
.cart-toggle-btn{background:#e63946;color:white;border:none;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:bold;position:relative;display:none}
.cart-toggle-btn .badge{position:absolute;top:-6px;right:-6px;background:#1a1a2e;color:white;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px}
.filters{padding:12px 20px;background:white;margin-bottom:6px}
.filter-bar{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.filter-btn{padding:5px 12px;border:1px solid #ddd;border-radius:18px;background:white;cursor:pointer;font-size:12px;transition:all .2s}
.filter-btn:hover{border-color:#e63946;color:#e63946}
.filter-btn.active{background:#e63946;color:white;border-color:#e63946}
.search-sort-row{display:flex;gap:8px;align-items:center}
.search-box{flex:1;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:12px}
.search-box:focus{outline:none;border-color:#e63946}
.sort-select{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:11px;background:white;cursor:pointer;min-width:130px}
#products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:0 20px 20px}
.product-card{background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.product-card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.product-card.out-of-stock{opacity:.55;position:relative}
.product-card.out-of-stock .img-wrap::after{content:'SOLD OUT';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.6);color:white;padding:6px 16px;border-radius:4px;font-size:13px;font-weight:bold;letter-spacing:1px}
.product-card.out-of-stock .img-wrap{position:relative}
.product-card .img-wrap{width:100%;height:140px;overflow:hidden;background:#f0f0f0;display:flex;align-items:center;justify-content:center}
.product-card .img-wrap img{width:100%;height:100%;object-fit:cover}
.product-card .no-img{color:#aaa;font-size:11px;text-align:center;padding:8px}
.product-info{padding:8px 10px}
.product-info .sku-line{font-size:9px;color:#aaa;font-family:monospace;margin-bottom:1px}
.product-info h3{font-size:12px;font-weight:bold;margin-bottom:0;color:#1a1a2e;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-info .name-jp{font-size:10px;color:#777;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.color-bar-wrap{display:flex;align-items:center;gap:0;margin-bottom:4px;border-radius:4px;overflow:hidden}
.color-bar{height:28px;flex:1;min-width:0}
.color-bar-label{flex:2;height:28px;display:flex;align-items:center;padding:0 8px;background:#f5f5f5;font-size:14px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:2px}
.badge-new{background:#10b981;color:white;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold}
.badge-stock{background:#fbbf24;color:#92400e;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold}
.badge-discontinued{background:#6b7280;color:white;padding:1px 5px;border-radius:3px;font-size:9px}
.stock-info{font-size:10px;color:#888;margin-bottom:2px}
.price-line{display:flex;align-items:baseline;gap:5px;margin-bottom:1px}
.wholesale-price{font-size:16px;font-weight:bold;color:#e63946}
.retail-price{font-size:10px;color:#aaa;text-decoration:line-through}
.rate-info{font-size:9px;color:#999;margin-bottom:4px}
.qty-row{display:flex;align-items:center;gap:0;margin-bottom:4px}
.qty-btn{width:28px;height:28px;border:1px solid #ddd;background:white;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.qty-btn:first-child{border-radius:5px 0 0 5px}
.qty-btn:last-child{border-radius:0 5px 5px 0}
.qty-input{width:40px;height:28px;border:1px solid #ddd;border-left:none;border-right:none;text-align:center;font-size:12px;-moz-appearance:textfield}
.qty-input::-webkit-outer-spin-button,.qty-input::-webkit-inner-spin-button{-webkit-appearance:none}
.add-btn{width:100%;padding:7px;background:#e63946;color:white;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;transition:all .2s}
.add-btn:hover{background:#c1121f}
.add-btn.added{background:#10b981;transform:scale(1.04)}
.no-order{width:100%;padding:7px;background:#e5e7eb;color:#9ca3af;border:none;border-radius:6px;font-size:11px;text-align:center}

/* Cart sidebar items */
.cart-sidebar-header{padding:12px 15px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
.cart-sidebar-header h2{font-size:15px;color:#1a1a2e}
.cart-count{font-size:11px;color:#888}
.cart-items-list{flex:1;overflow-y:auto;padding:8px 10px;min-height:0}
.cart-item{display:flex;gap:6px;padding:6px;border-bottom:1px solid #f0f0f0;align-items:center}
.cart-item .item-thumb{width:36px;height:36px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#f0f0f0}
.cart-item .item-color-dot{width:12px;height:12px;border-radius:50%;border:1px solid #ddd;flex-shrink:0}
.cart-item .item-body{flex:1;min-width:0}
.cart-item .item-name{font-size:10px;font-weight:bold;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item .item-detail{font-size:9px;color:#888}
.cart-item .item-row2{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.cart-item .item-qty{display:flex;align-items:center;gap:2px}
.cart-item .item-qty button{width:18px;height:18px;border:1px solid #ddd;background:white;cursor:pointer;border-radius:3px;font-size:10px;display:flex;align-items:center;justify-content:center}
.cart-item .item-qty input{width:28px;height:18px;text-align:center;border:1px solid #ddd;border-radius:3px;font-size:9px}
.cart-item .item-price{font-size:11px;font-weight:bold;color:#e63946}
.cart-item .item-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0}
.cart-item .item-remove:hover{color:#e63946}
.cart-empty{text-align:center;color:#ccc;padding:30px 15px;font-size:12px}
.cart-footer{padding:10px 12px;border-top:1px solid #eee;background:#fafafa;flex-shrink:0}
.cart-footer .line{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.cart-footer .total{font-size:14px;font-weight:bold;color:#e63946;border-top:1px solid #ddd;padding-top:5px;margin-top:3px}
.checkout-btn{width:100%;padding:11px;background:#e63946;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:bold;margin-top:6px}
.checkout-btn:hover{background:#c1121f}

/* Footer */
.site-footer{background:#1a1a2e;color:#888;padding:20px;text-align:center;font-size:11px}
.site-footer a{color:#aaa;text-decoration:none;margin:0 8px}
.site-footer a:hover{color:white}

/* Checkout */
.checkout-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:300;display:none;align-items:start;justify-content:center;overflow-y:auto;padding:30px 20px}
.checkout-overlay.open{display:flex}
.checkout-modal{background:white;border-radius:12px;padding:22px;max-width:600px;width:100%}
.checkout-modal h2{font-size:15px;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #e63946}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:bold;margin-bottom:2px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 9px;border:1px solid #ddd;border-radius:6px;font-size:12px}
.form-group textarea{height:60px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.review-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:11px}
.review-table th{background:#f5f5f5;padding:5px;text-align:left;border-bottom:1px solid #ddd}
.review-table td{padding:5px;border-bottom:1px solid #eee}
.review-table .qty-cell input{width:40px;text-align:center;padding:3px;border:1px solid #ddd;border-radius:4px}
.order-total{background:#fafafa;padding:10px;border-radius:8px;margin:10px 0}
.order-total .line{display:flex;justify-content:space-between;padding:2px 0;font-size:11px}
.order-total .total{font-size:15px;font-weight:bold;color:#e63946;border-top:1px solid #ddd;padding-top:5px;margin-top:3px}
.submit-btn{width:100%;padding:11px;background:#e63946;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:bold}
.submit-btn:hover{background:#c1121f}
.submit-btn:disabled{background:#ccc}

/* Admin page */
.admin-page-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:start;justify-content:center;overflow-y:auto;padding:20px}
.admin-page-overlay.open{display:flex}
.admin-page{background:white;border-radius:12px;padding:20px;max-width:1100px;width:100%;max-height:90vh;display:flex;flex-direction:column}
.admin-page h2{font-size:16px;margin-bottom:12px;color:#1a1a2e}
.admin-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:2px solid #e5e7eb}
.admin-tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;margin-bottom:-2px}
.admin-tab.active{color:#e63946;border-bottom-color:#e63946;font-weight:bold}
.admin-section{display:none}
.admin-section.active{display:block}
.csv-upload-area{border:2px dashed #ddd;border-radius:8px;padding:30px;text-align:center;margin-bottom:15px;cursor:pointer;transition:border-color .2s}
.csv-upload-area:hover{border-color:#e63946}
.csv-upload-area input{display:none}
.csv-status{margin:10px 0;padding:10px;border-radius:6px;font-size:12px;display:none}
.csv-status.success{display:block;background:#d1fae5;color:#065f46}
.csv-status.error{display:block;background:#fee2e2;color:#991b1b}
.stock-edit-table{width:100%;border-collapse:collapse;font-size:11px}
.stock-edit-table th{background:#f5f5f5;padding:5px 6px;text-align:left;position:sticky;top:0;z-index:1}
.stock-edit-table td{padding:3px 6px;border-bottom:1px solid #eee}
.stock-edit-table input[type=number]{width:60px;padding:3px;border:1px solid #ddd;border-radius:4px;text-align:center}
.stock-edit-wrapper{overflow-y:auto;max-height:55vh}
.admin-btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold}
.admin-btn-primary{background:#e63946;color:white}
.admin-btn-primary:hover{background:#c1121f}
.admin-btn-success{background:#10b981;color:white}
.admin-btn-success:hover{background:#059669}
.admin-actions{display:flex;gap:8px;margin-top:10px}
.admin-login-box{background:white;padding:30px;border-radius:12px;max-width:320px;width:100%;text-align:center}
.admin-login-box input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;margin:8px 0;font-size:13px}
.admin-login-box button{padding:8px 20px;background:#1a1a2e;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px}
.admin-login-error{color:#e63946;font-size:12px;display:none;margin-top:5px}

/* Mobile */
@media(max-width:1024px){
  .cart-sidebar{display:none}
  .cart-toggle-btn{display:block}
  .cart-sidebar.mobile-open{display:flex;position:fixed;top:0;right:0;height:100vh;z-index:250;width:320px;box-shadow:-4px 0 20px rgba(0,0,0,.15)}
  .cart-mobile-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:240;display:none}
  .cart-mobile-overlay.open{display:block}
}
@media(max-width:768px){
  #products-grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:0 10px 10px}
  .product-card .img-wrap{height:120px}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:480px){#products-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="header-left"><div><h1 class="header-title">MIYAGEN Trail Engineering</h1><p class="header-subtitle">Wholesale Order System / 取引先専用 卸注文ページ</p></div></div>
  <div class="header-right">
    <button class="cart-toggle-btn" id="cart-toggle-btn" onclick="toggleMobileCart()">カート<span class="badge" id="cart-badge-mobile">0</span></button>
  </div>
</header>
<div class="cart-mobile-overlay" id="cart-mobile-overlay" onclick="toggleMobileCart()"></div>
<div class="page-layout">
  <div class="main-content">
    <div class="filters">
      <div class="filter-bar" id="filter-bar"></div>
      <div class="search-sort-row">
        <input type="text" id="search-input" class="search-box" placeholder="商品名、色、品番で検索...">
        <select id="sort-select" class="sort-select" onchange="renderProducts()">
          <option value="name-asc">商品名 A→Z</option>
          <option value="default">注文可能優先</option>
          <option value="sku-asc">品番順 ↑</option>
          <option value="sku-desc">品番順 ↓</option>
          <option value="price-asc">卸価格 安い順</option>
          <option value="price-desc">卸価格 高い順</option>
          <option value="stock-desc">在庫多い順</option>
        </select>
      </div>
    </div>
    <div id="products-grid"></div>
    <footer class="site-footer">
      <p>&copy; MIYAGEN Trail Engineering</p>
      
    </footer>
  </div>
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-sidebar-header"><h2>カート</h2><div style="display:flex;align-items:center;gap:8px"><span class="cart-count" id="cart-count">0点</span><button id="cart-clear-btn" onclick="if(cart.length&&confirm('カートを空にしますか？')){cart=[];saveCart();renderCartSidebar();updateCartBadge()}" style="background:none;border:1px solid #ddd;border-radius:4px;padding:2px 6px;font-size:9px;color:#999;cursor:pointer;display:none">全削除</button></div></div>
    <div class="cart-items-list" id="cart-items"></div>
    <div class="cart-footer" id="cart-footer"></div>
  </div>
</div>

<!-- Checkout -->
<div class="checkout-overlay" id="checkout-overlay">
  <div class="checkout-modal">
    <h2>会社情報</h2>
    <form id="checkout-form" onsubmit="return false">
      <div class="form-group"><label>会社名 *</label><input type="text" name="company_name" required></div>
      <div class="form-group"><label>担当者名 *</label><input type="text" name="contact_name" required></div>
      <div class="form-row"><div class="form-group"><label>メール *</label><input type="email" name="email" required></div><div class="form-group"><label>電話番号 *</label><input type="tel" name="phone" required></div></div>
      
      <h2 style="font-size:15px;margin:15px 0 10px;padding-bottom:6px;border-bottom:2px solid #e63946">配送先</h2>
      <div class="form-group"><label>配送先名 *</label><input type="text" name="ship_name" required placeholder="店舗名・屋号"></div>
      <div class="form-row"><div class="form-group"><label>郵便番号</label><input type="text" name="ship_postal" placeholder="000-0000"></div><div class="form-group"><label>都道府県</label><select name="ship_pref"><option value="">選択</option><option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option><option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option><option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option><option>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option><option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option><option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option><option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option><option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option><option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option><option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option><option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option><option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option></select></div></div>
      <div class="form-group"><label>住所</label><input type="text" name="ship_address" placeholder="市区町村・番地・建物"></div>
      <div class="form-group"><label>電話番号</label><input type="tel" name="ship_phone"></div>
      <div class="form-group"><label>備考</label><textarea name="notes"></textarea></div>
    </form>
    <h2>注文内容確認</h2>
    <table class="review-table" id="review-table"><thead><tr><th>商品</th><th>数量</th><th>単価</th><th>小計</th></tr></thead><tbody></tbody></table>
    <div class="order-total" id="order-total"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitOrder()">注文を確定する</button>
  </div>
</div>

<!-- Admin Page -->
<div class="admin-page-overlay" id="admin-page-overlay">
  <div id="admin-login-view" class="admin-login-box">
    <h3 style="margin-bottom:10px">管理画面ログイン</h3>
    <input type="password" id="admin-pw" placeholder="パスワード" onkeydown="if(event.key==='Enter')doAdminLogin()">
    <p class="admin-login-error" id="admin-err">パスワードが違います</p>
    <button onclick="doAdminLogin()">ログイン</button>
  </div>
  <div id="admin-panel" class="admin-page" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2>管理画面</h2>
      <button style="background:none;border:none;font-size:20px;cursor:pointer;color:#666" onclick="closeAdmin()">&times;</button>
    </div>
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="switchAdminTab(this,'tab-stock')">在庫管理</button>
      <button class="admin-tab" onclick="switchAdminTab(this,'tab-csv')">CSV商品更新</button>
    </div>
    <div id="tab-stock" class="admin-section active">
      <div class="stock-edit-wrapper"><table class="stock-edit-table"><thead><tr><th>品番</th><th>商品名</th><th>カラー</th><th>サイズ</th><th>在庫</th><th style="text-align:center">販売NG</th><th style="text-align:center">非表示</th></tr></thead><tbody id="stock-tbody"></tbody></table></div>
      <div class="admin-actions"><button class="admin-btn admin-btn-success" onclick="saveStock()">在庫を保存</button></div>
    </div>
    <div id="tab-csv" class="admin-section">
      <p style="font-size:12px;color:#666;margin-bottom:10px">バリエーションCSVをアップロードすると商品データが更新されます。在庫数は保持されます。</p>
      <div class="csv-upload-area" onclick="document.getElementById('csv-file').click()">
        <input type="file" id="csv-file" accept=".csv" onchange="handleCSV(this)">
        <p style="font-size:14px;color:#666">CSVファイルをクリックして選択</p>
        <p style="font-size:11px;color:#aaa;margin-top:5px">またはドラッグ&ドロップ</p>
      </div>
      <div class="csv-status" id="csv-status"></div>
      <div class="admin-actions"><button class="admin-btn admin-btn-primary" id="csv-apply-btn" onclick="applyCSV()" style="display:none">商品データを更新</button></div>
    </div>
  </div>

function initFilters(){const bar=document.getElementById('filter-bar');FILTER_CATEGORIES.forEach(cat=>{const btn=document.createElement('button');btn.className='filter-btn'+(cat.label===currentFilter?' active':'');btn.textContent=cat.label;btn.onclick=()=>{currentFilter=cat.label;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderProducts()};bar.appendChild(btn)})}
function getProductKey(p){return p.sku+'_'+(p.color||'')+'_'+(p.size||'')}
function filterProducts(){const cat=FILTER_CATEGORIES.find(c=>c.label===currentFilter)||FILTER_CATEGORIES[0];let f=PRODUCTS.filter(p=>!p.hidden).filter(cat.match);if(searchQuery){const q=searchQuery.toLowerCase();f=f.filter(p=>(p.name_jp||'').toLowerCase().includes(q)||(p.name_en||'').toLowerCase().includes(q)||(p.color||'').toLowerCase().includes(q)||(p.category_mid||'').toLowerCase().includes(q)||String(p.sku).includes(q))}return sortProducts(f)}
function sortProducts(arr){const m=document.getElementById('sort-select')?.value||'name-asc';const s=[...arr];switch(m){case'sku-asc':return s.sort((a,b)=>a.sku-b.sku);case'sku-desc':return s.sort((a,b)=>b.sku-a.sku);case'price-asc':return s.sort((a,b)=>a.wholesale_price-b.wholesale_price);case'price-desc':return s.sort((a,b)=>b.wholesale_price-a.wholesale_price);case'name-asc':return s.sort((a,b)=>(a.name_en||'').localeCompare(b.name_en||''));case'stock-desc':return s.sort((a,b)=>b.stock-a.stock);default:return s.sort((a,b)=>{const ao=a.wholesale_ok==='OK'&&a.stock>0?0:1;const bo=b.wholesale_ok==='OK'&&b.stock>0?0:1;if(ao!==bo)return ao-bo;return(a.name_en||'').localeCompare(b.name_en||'')})}}

function renderProducts(){
  const grid=document.getElementById('products-grid');const filtered=filterProducts();grid.innerHTML='';
  filtered.forEach(p=>{
    const key=getProductKey(p);const canOrder=p.wholesale_ok==='OK'&&p.stock>0;const colorHex=COLOR_MAP[p.color]||'#ccc';
    const card=document.createElement('div');card.className='product-card'+(canOrder?'':' out-of-stock');
    const safeName=(p.name_en||p.name_jp||'').replace(/'/g,"\\'");
    card.innerHTML=`
      <div class="img-wrap">${p.image?`<img src="${p.image}" alt="${p.name_en}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'no-img\'>${safeName}</div>'">`:`<div class="no-img">${p.name_en||p.name_jp}</div>`}</div>
      <div class="product-info">
        <div class="sku-line">#${p.sku}</div>
        <h3 title="${p.name_en||p.name_jp}">${p.name_en||p.name_jp}</h3>
        <div class="name-jp" title="${p.name_jp}">${p.name_jp}</div>
        <div class="color-bar-wrap"><div class="color-bar" style="background:${colorHex}${p.color==='WHITE'?';border:1px solid #ddd':''}"></div><div class="color-bar-label">${p.color}${p.size&&p.size!=='-'?' / '+p.size:''}</div></div>
        <div class="product-badges">${p.is_new?'<span class="badge-new">NEW</span>':''}${p.stock<=0?'<span class="badge-stock">在庫切れ</span>':''}${p.is_discontinued?'<span class="badge-discontinued">終売</span>':''}</div>
        <div class="stock-info">${canOrder?p.stock+'個':(p.stock<=0?'在庫なし':'注文不可')}</div>
        <div class="price-line"><span class="wholesale-price">¥${p.wholesale_price.toLocaleString()}</span><span class="retail-price">小売 ¥${p.retail_price.toLocaleString()}</span></div>
        <div class="rate-info">掛率: ${Math.round(p.discount_rate*100)}% | 税率: ${Math.round(p.tax_rate*100)}%</div>
        ${canOrder?`<div class="qty-row"><button class="qty-btn" onclick="changeQty(this,-1)">−</button><input type="number" class="qty-input" value="1" min="1" max="${p.stock}" data-key="${key}"><button class="qty-btn" onclick="changeQty(this,1)">+</button></div><button class="add-btn" onclick="addToCart('${key}',this)">カートに追加</button>`:'<div class="no-order">注文不可</div>'}
      </div>`;
    grid.appendChild(card);
  });
  updateCartBadge();
}

function changeQty(btn,d){const i=btn.parentElement.querySelector('.qty-input');const mx=parseInt(i.max)||999;let v=parseInt(i.value)||1;v=Math.max(1,Math.min(mx,v+d));i.value=v}
function addToCart(key,btnEl){const product=PRODUCTS.find(p=>getProductKey(p)===key);if(!product)return;const qtyInput=document.querySelector(`input[data-key="${key}"]`);const qty=parseInt(qtyInput?.value)||1;const existing=cart.find(i=>getProductKey(i.product)===key);if(existing){existing.quantity=Math.min(existing.quantity+qty,product.stock)}else{cart.push({product,quantity:Math.min(qty,product.stock)})}saveCart();renderCartSidebar();updateCartBadge();if(qtyInput)qtyInput.value=1;if(btnEl){btnEl.textContent='✓ 追加しました';btnEl.classList.add('added');setTimeout(()=>{btnEl.textContent='カートに追加';btnEl.classList.remove('added')},1200)}}
function removeFromCart(key){cart=cart.filter(i=>getProductKey(i.product)!==key);saveCart();renderCartSidebar();updateCartBadge()}
function updateCartQty(key,qty){const item=cart.find(i=>getProductKey(i.product)===key);if(item){item.quantity=Math.max(1,Math.min(qty,item.product.stock));saveCart();renderCartSidebar()}}
function saveCart(){localStorage.setItem('miyagen_cart',JSON.stringify(cart))}
function updateCartBadge(){const total=cart.reduce((s,i)=>s+i.quantity,0);const badge=document.getElementById('cart-badge-mobile');if(badge){badge.textContent=total;badge.style.display=total>0?'flex':'none'}document.getElementById('cart-count').textContent=total+'点 ('+cart.length+'商品)'}

function renderCartSidebar(){
  const items=document.getElementById('cart-items');const footer=document.getElementById('cart-footer');updateCartBadge();
  const clearBtn=document.getElementById('cart-clear-btn');if(clearBtn)clearBtn.style.display=cart.length>0?'inline-block':'none';
  if(cart.length===0){items.innerHTML='<div class="cart-empty">カートは空です</div>';footer.innerHTML='';return}
  items.innerHTML=cart.map(i=>{const p=i.product;const key=getProductKey(p);const colorHex=COLOR_MAP[p.color]||'#ccc';const thumbHtml=p.image?`<img class="item-thumb" src="${p.image}" alt="">`:`<span class="item-color-dot" style="width:36px;height:36px;border-radius:4px;background:${colorHex}"></span>`;return`<div class="cart-item">${thumbHtml}<span class="item-color-dot" style="background:${colorHex}"></span><div class="item-body"><div class="item-name">${p.name_en||p.name_jp}</div><div class="item-detail">${p.color}${p.size!=='-'?' / '+p.size:''}</div><div class="item-row2"><div class="item-qty"><button onclick="updateCartQty('${key}',${i.quantity-1})">-</button><input value="${i.quantity}" onchange="updateCartQty('${key}',parseInt(this.value)||1)"><button onclick="updateCartQty('${key}',${i.quantity+1})">+</button></div><div class="item-price">¥${(p.wholesale_price*i.quantity).toLocaleString()}</div></div></div><button class="item-remove" onclick="removeFromCart('${key}')">&times;</button></div>`}).join('');
  const subtotal=cart.reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0);const shipping=subtotal<30000?1000:0;
  const tax10=Math.floor(cart.filter(i=>i.product.tax_rate===0.1).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.1);
  const tax8=Math.floor(cart.filter(i=>i.product.tax_rate===0.08).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.08);
  const total=subtotal+shipping+tax10+tax8;
  footer.innerHTML=`<div class="line"><span>小計:</span><span>¥${subtotal.toLocaleString()}</span></div><div class="line"><span>送料 (税抜¥30,000未満):</span><span>¥${shipping.toLocaleString()}</span></div><div class="line"><span>税金 (10%):</span><span>¥${tax10.toLocaleString()}</span></div>${tax8>0?`<div class="line"><span>税金 (8%):</span><span>¥${tax8.toLocaleString()}</span></div>`:``}<div class="line total"><span>合計:</span><span>¥${total.toLocaleString()}</span></div><button class="checkout-btn" onclick="openCheckout()">注文手続きへ進む</button>`;
}

function toggleMobileCart(){document.getElementById('cart-sidebar').classList.toggle('mobile-open');document.getElementById('cart-mobile-overlay').classList.toggle('open')}
function formatPrice(n){return'¥'+n.toLocaleString()}

// Checkout
function saveFormData(){const form=document.getElementById('checkout-form');const fd=new FormData(form);const d={};['company_name','contact_name','email','phone','ship_name','ship_postal','ship_pref','ship_address','ship_phone'].forEach(k=>{d[k]=fd.get(k)||''});localStorage.setItem('miyagen_form',JSON.stringify(d))}
function loadFormData(){const s=JSON.parse(localStorage.getItem('miyagen_form')||'{}');const form=document.getElementById('checkout-form');Object.entries(s).forEach(([k,v])=>{const el=form.querySelector(`[name="${k}"]`);if(el&&v)el.value=v})}
function openCheckout(){renderCheckoutReview();loadFormData();document.getElementById('checkout-overlay').classList.add('open')}
function closeCheckout(){document.getElementById('checkout-overlay').classList.remove('open')}
function renderCheckoutReview(){const tbody=document.querySelector('#review-table tbody');tbody.innerHTML='';cart.forEach(i=>{const p=i.product;const key=getProductKey(p);const row=document.createElement('tr');row.innerHTML=`<td><span style="font-weight:bold">${p.name_en||p.name_jp}</span> <span style="color:#e63946;font-weight:bold">${p.color}</span>${p.size&&p.size!=='-'?' / '+p.size:''}<br><small style="color:#aaa">#${p.sku}</small></td><td class="qty-cell"><input type="number" value="${i.quantity}" min="1" max="${p.stock}" data-checkout-key="${key}" onchange="updateCheckoutQty(this)"></td><td>${formatPrice(p.wholesale_price)}</td><td>${formatPrice(p.wholesale_price*i.quantity)}</td>`;tbody.appendChild(row)});updateCheckoutTotal()}
function updateCheckoutQty(input){const key=input.dataset.checkoutKey;const item=cart.find(i=>getProductKey(i.product)===key);if(item){item.quantity=Math.max(1,Math.min(parseInt(input.value)||1,item.product.stock));input.value=item.quantity;saveCart();renderCheckoutReview();renderCartSidebar();updateCartBadge()}}
function updateCheckoutTotal(){const subtotal=cart.reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0);const shipping=subtotal<30000?1000:0;const tax10=Math.floor(cart.filter(i=>i.product.tax_rate===0.1).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.1);const tax8=Math.floor(cart.filter(i=>i.product.tax_rate===0.08).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.08);const total=subtotal+shipping+tax10+tax8;document.getElementById('order-total').innerHTML=`<div class="line"><span>小計</span><span>${formatPrice(subtotal)}</span></div><div class="line"><span>送料</span><span>${formatPrice(shipping)}</span></div><div class="line"><span>税金 (10%)</span><span>${formatPrice(tax10)}</span></div>${tax8>0?`<div class="line"><span>税金 (8%)</span><span>${formatPrice(tax8)}</span></div>`:``}<div class="line total"><span>合計</span><span>${formatPrice(total)}</span></div>`}
async function submitOrder(){const form=document.getElementById('checkout-form');const fd=new FormData(form);if(!fd.get('company_name')||!fd.get('contact_name')||!fd.get('email')||!fd.get('phone')){alert('必須項目を入力してください');return}if(!GAS_URL){alert('GAS_URLが設定されていません');return}saveFormData();const subtotal=cart.reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0);const shipping=subtotal<30000?1000:0;const tax10=Math.floor(cart.filter(i=>i.product.tax_rate===0.1).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.1);const tax8=Math.floor(cart.filter(i=>i.product.tax_rate===0.08).reduce((s,i)=>s+i.product.wholesale_price*i.quantity,0)*0.08);const total=subtotal+shipping+tax10+tax8;const orderItems=cart.map(i=>({name:i.product.name_jp||i.product.name_en||'',color:i.product.color||'-',size:i.product.size||'-',qty:i.quantity,wholesale_price:i.product.wholesale_price||0}));const orderData={company:fd.get('company_name'),contact:fd.get('contact_name'),email:fd.get('email'),phone:fd.get('phone'),ship_name:fd.get('ship_name')||'',ship_postal:fd.get('ship_postal')||'',ship_pref:fd.get('ship_pref')||'',ship_address:fd.get('ship_address')||'',ship_phone:fd.get('ship_phone')||'',notes:fd.get('notes')||'',items:orderItems,subtotal,shipping,tax_10:tax10,tax_8:tax8,total,order_date:new Date().toISOString()};const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='送信中...';try{const jsonStr=JSON.stringify(orderData);const encodedPayload=encodeURIComponent(jsonStr);const scriptEl=document.createElement('script');scriptEl.src=GAS_URL+'?payload='+encodedPayload+'&callback=orderCallback';document.body.appendChild(scriptEl);window.orderCallback=function(){};await new Promise(r=>setTimeout(r,4000));try{scriptEl.remove()}catch(e){};alert('注文が完了しました！\nご注文ありがとうございます。');cart=[];saveCart();renderCartSidebar();updateCartBadge();closeCheckout()}catch(e){alert('送信エラーが発生しました: '+e.message)}finally{btn.disabled=false;btn.textContent='注文を確定する'}}

// === ADMIN ===
function openAdminLogin(){document.getElementById('admin-page-overlay').classList.add('open');document.getElementById('admin-login-view').style.display='';document.getElementById('admin-panel').style.display='none';document.getElementById('admin-pw').value='';document.getElementById('admin-pw').focus()}
function closeAdmin(){document.getElementById('admin-page-overlay').classList.remove('open')}
async function hashPw(pw){try{const e=new TextEncoder();const d=e.encode(pw+'_miyagen_salt_2026');const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('')}catch(err){var h=0;var s=pw+'_miyagen_salt_2026';for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h).toString(16)}}
async function doAdminLogin(){const pw=document.getElementById('admin-pw').value;const h=await hashPw(pw);if(h===ADMIN_HASH){isAdmin=true;document.getElementById('admin-login-view').style.display='none';document.getElementById('admin-panel').style.display='flex';renderStockTable()}else{document.getElementById('admin-err').style.display='block'}}
function switchAdminTab(btn,tabId){document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));document.getElementById(tabId).classList.add('active')}
function renderStockTable(){const tb=document.getElementById('stock-tbody');tb.innerHTML='';PRODUCTS.forEach(p=>{const key=getProductKey(p);const r=document.createElement('tr');if(p.hidden)r.style.opacity='0.4';r.innerHTML=`<td style="font-family:monospace;font-size:9px">${p.sku}</td><td style="font-size:11px">${p.name_en||p.name_jp}</td><td style="font-size:11px">${p.color}</td><td style="font-size:11px">${p.size}</td><td><input type="number" value="${p.stock}" data-stock-key="${key}"></td><td style="text-align:center"><input type="checkbox" data-ng-key="${key}" ${p.wholesale_ok!=='OK'?'checked':''}></td><td style="text-align:center"><input type="checkbox" data-hide-key="${key}" ${p.hidden?'checked':''}></td>`;tb.appendChild(r)})}
function saveStock(){document.querySelectorAll('[data-stock-key]').forEach(input=>{const k=input.dataset.stockKey;const p=PRODUCTS.find(p=>getProductKey(p)===k);if(p)p.stock=parseInt(input.value)||0});document.querySelectorAll('[data-ng-key]').forEach(cb=>{const k=cb.dataset.ngKey;const p=PRODUCTS.find(p=>getProductKey(p)===k);if(p)p.wholesale_ok=cb.checked?'NG':'OK'});document.querySelectorAll('[data-hide-key]').forEach(cb=>{const k=cb.dataset.hideKey;const p=PRODUCTS.find(p=>getProductKey(p)===k);if(p)p.hidden=cb.checked});localStorage.setItem('miyagen_stock',JSON.stringify(PRODUCTS.map(p=>({key:getProductKey(p),stock:p.stock,wholesale_ok:p.wholesale_ok,hidden:!!p.hidden}))));renderProducts();renderCartSidebar();alert('保存しました')}

// CSV parsing
function handleCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result;
      const lines=text.split('\n');
      const headers=parseCSVLine(lines[0]);
      const rows=[];
      for(let i=1;i<lines.length;i++){if(lines[i].trim()){rows.push(parseCSVLine(lines[i]))}}
      pendingCSV={headers,rows};
      const st=document.getElementById('csv-status');
      st.className='csv-status success';
      st.textContent=`${rows.length}件の商品データを読み込みました。「商品データを更新」ボタンで反映できます。`;
      document.getElementById('csv-apply-btn').style.display='inline-block';
    }catch(err){
      const st=document.getElementById('csv-status');
      st.className='csv-status error';
      st.textContent='CSVの読み込みに失敗しました: '+err.message;
    }
  };
  reader.readAsText(file,'UTF-8');
}
function parseCSVLine(line){const result=[];let current='';let inQuote=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQuote&&line[i+1]==='"'){current+='"';i++}else{inQuote=!inQuote}}else if(c===','&&!inQuote){result.push(current.trim());current=''}else{current+=c}}result.push(current.trim());return result}

function applyCSV(){
  if(!pendingCSV)return;
  const{headers,rows}=pendingCSV;
  const hi=k=>headers.indexOf(k);
  const savedStock={};
  PRODUCTS.forEach(p=>{savedStock[getProductKey(p)]=p.stock});
  // Also keep saved images
  const savedImages={};
  PRODUCTS.forEach(p=>{if(p.image)savedImages[getProductKey(p)]=p.image});

  const newProducts=[];
  rows.forEach(cols=>{
    const sku=parseInt(cols[hi('品番')])||0;
    if(!sku)return;
    const parsePrice=s=>{const n=String(s||'').replace(/[¥,]/g,'');return parseInt(n)||0};
    const parseRate=s=>{const n=String(s||'').replace(/%/g,'');return parseFloat(n)/100||0};
    const p={
      sku,
      name_jp:cols[hi('製品名（product name）')]||'',
      name_en:cols[hi('product name')]||'',
      color:cols[hi('カラー')]||'',
      size:cols[hi('サイズ')]||'-',
      category_main:cols[hi('カテゴリー大分類')]||'',
      category_mid:cols[hi('カテゴリー中分類')]||'',
      category_sub:cols[hi('カテゴリー小分類')]||'',
      description:cols[hi('商品説明')]||'',
      base_url:cols[hi('URL')]||'',
      wholesale_ok:(cols[hi('卸し販売')]||'').trim()==='OK'?'OK':'NG',
      retail_price:parsePrice(cols[hi('税抜上代')]),
      tax_inclusive_price:parsePrice(cols[hi('税込価格')]),
      wholesale_price:parsePrice(cols[hi('卸し単価（税抜）')]),
      discount_rate:parseRate(cols[hi('掛け率')]),
      tax_rate:parseRate(cols[hi('消費税')]),
      is_new:!!(cols[hi('新商品')]||'').trim(),
      is_discontinued:false,
      stock:0,
      image:''
    };
    const key=getProductKey(p);
    if(savedStock[key]!==undefined)p.stock=savedStock[key];
    if(savedImages[key])p.image=savedImages[key];
    newProducts.push(p);
  });

  PRODUCTS.length=0;
  newProducts.forEach(p=>PRODUCTS.push(p));
  localStorage.setItem('miyagen_products',JSON.stringify(PRODUCTS));
  renderProducts();renderStockTable();renderCartSidebar();
  const st=document.getElementById('csv-status');
  st.className='csv-status success';
  st.textContent=`${newProducts.length}件の商品データを更新しました！`;
  document.getElementById('csv-apply-btn').style.display='none';
  pendingCSV=null;
}

function loadSavedStock(){const s=JSON.parse(localStorage.getItem('miyagen_stock')||'[]');s.forEach(s=>{const p=PRODUCTS.find(p=>getProductKey(p)===s.key);if(p){p.stock=s.stock;if(s.wholesale_ok!==undefined)p.wholesale_ok=s.wholesale_ok;if(s.hidden!==undefined)p.hidden=s.hidden}})}
function loadSavedProducts(){const s=localStorage.getItem('miyagen_products');if(s){try{const saved=JSON.parse(s);if(saved.length>0){PRODUCTS.length=0;saved.forEach(p=>PRODUCTS.push(p))}}catch(e){}}}

// Events
document.getElementById('search-input').addEventListener('input',function(){searchQuery=this.value.trim();renderProducts()});
document.getElementById('checkout-overlay').addEventListener('click',function(e){if(e.target===this)closeCheckout()});
document.getElementById('admin-page-overlay').addEventListener('click',function(e){if(e.target===this)closeAdmin()});
document.getElementById('checkout-form').addEventListener('input',saveFormData);
// CSV drag and drop
const csvArea=document.querySelector('.csv-upload-area');
if(csvArea){csvArea.addEventListener('dragover',e=>{e.preventDefault();csvArea.style.borderColor='#e63946'});csvArea.addEventListener('dragleave',()=>{csvArea.style.borderColor='#ddd'});csvArea.addEventListener('drop',e=>{e.preventDefault();csvArea.style.borderColor='#ddd';const f=e.dataTransfer.files[0];if(f){document.getElementById('csv-file').files=e.dataTransfer.files;handleCSV(document.getElementById('csv-file'))}})}

// Init
loadSavedProducts();
loadSavedStock();
initFilters();
renderProducts();
renderCartSidebar();
</script>
